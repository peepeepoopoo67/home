<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Course Player</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="erbaum/stylesheet.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="course-player.css">
</head>
<body class="player-body">

    <header class="player-topbar">
        <div class="player-topbar-left">
            <a href="intern-hub.html" class="player-back">
                <svg viewBox="0 0 20 20" fill="none"><path d="M12 5l-5 5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <img src="ALPS_Logo-04.png" alt="ALPS" class="player-logo">
            </a>
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                <svg viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
        
        <div class="player-course-title" id="player-course-title">Intern Course Platform</div>
        
        <div class="player-topbar-right">
            <span class="player-preview-badge" id="course-status-badge">In Progress</span>
        </div>
    </header>

    <div class="player-layout">

        <aside class="player-sidebar" id="player-sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-heading">COURSE CONTENT</h2>
                
                <div class="sidebar-progress-wrapper">
                    <div class="sidebar-progress-info">
                        <span id="progress-text">0% Completed</span>
                        <span id="progress-fraction">0/0</span>
                    </div>
                    <div class="sidebar-progress-track">
                        <div class="sidebar-progress-fill" id="sidebar-progress-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-scroll" id="sidebar-scroll">
                </div>
        </aside>

        <main class="player-content">

            <div class="player-frame-wrap">
                <div class="player-placeholder" id="player-placeholder">
                    <div class="player-placeholder-icon">
                        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="4" y="4" width="40" height="40" rx="4"/>
                            <path d="M18 16l14 8-14 8V16z"/>
                        </svg>
                    </div>
                    <h3>Select a lesson to begin</h3>
                    <p>Complete lessons sequentially to unlock the next modules.</p>
                </div>
                <iframe id="player-iframe" src="" title="Course Lesson" allowfullscreen style="display:none;"></iframe>
            </div>

            <div class="player-lesson-info" id="player-lesson-info" style="display:none;">
                <div class="lesson-info-left">
                    <span class="lesson-info-number" id="lesson-info-number">Lesson 1</span>
                    <h3 class="lesson-info-title" id="lesson-info-title"></h3>
                </div>
            </div>

            <div class="player-locked-wall" id="player-locked-wall" style="display:none;">
                <div class="locked-wall-inner">
                    <svg class="locked-wall-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="8" y="22" width="32" height="22" rx="4"/>
                        <path d="M16 22V16a8 8 0 0 1 16 0v6"/>
                    </svg>
                    <h3>Lesson Locked</h3>
                    <p>You must complete the previous lessons before accessing this module. Finish the current lesson to proceed.</p>
                </div>
            </div>

        </main>

    </div>

    <script src="course-player.js"></script>
</body>
</html>
